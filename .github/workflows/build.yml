name: "Build Plugin"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Verify output files
        run: |
          echo "Checking build artifacts..."
          test -f main.js && echo "✓ main.js exists" || echo "✗ main.js missing"
          test -f manifest.json && echo "✓ manifest.json exists" || echo "✗ manifest.json missing"
          test -f styles.css && echo "✓ styles.css exists" || echo "  styles.css not found (optional)"
